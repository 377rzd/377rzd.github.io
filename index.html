<!DOCTYPE html>
<html>
  <head>
    <title>Chance Casino and Resort</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            font-family: "Comic Sans MS";
            text-decoration:none;
        }
        nav{
            position:sticky;
            padding:10px;
            background-color:#11233b;
            box-shadow: 0 4px 15px rgba(52, 52, 72, 0.662);
        }
        .navBar{
            display: flex;
            margin: auto;
            max-width: 1200px;
            color: #dde6ed;
            justify-content: space-between;
        }
        .navBar > div{
            display: flex;
            align-items: center;
        }
        .title img,span{
            margin-right:20px;
        }
        .title>span{
            font-size:1.5rem;
        }
        .nav-links > a{
            margin-right: 20px;
            padding:5px;
            border-radius:5px;
            color: #dde6ed;
            transition:all 0.2s ease-in-out;
        }
        .nav-links > a:hover{
            background-color: #a50000;
            color: #8cacda;
        }
       
       
        @media screen and (max-width:800px) {
            .navBar{
                display: flex;
                flex-direction: column;
            }
            .navBar>div{
                display: inline-block;
                padding: 1% 2%;
                margin:auto;
            }
        }
        .box {
    width: 106px;
    height: 151px;
    position: absolute;
    perspective: 1000px;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
}

.box:hover .box-content {
    transform: rotateY(180deg);
    
}

.box-content {
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.8s;
}

.box-front,
.box-back {
    position: absolute;
    width: 100%;
    height: 100%;
    padding: 20px;
    color: white;
    backface-visibility: hidden;
    border-radius: 20px;
}

.box-front {
    background: #397473;
    font-size: 2rem;
    text-align: center;
    transform: rotateY(0deg);
}

.box-back {
    background: #8e54d0;
    transform: rotateY(180deg);
}
.box-back button{
    display: block;
    margin: auto;
    padding-top: 1rem;
}
.neon-button {
    display: inline-block;
    padding: 10px 20px;
    background-color: #000;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    cursor: pointer;
    position: relative;
    transition: background-color 0.5s, box-shadow 0.5s;
}

.neon-button:hover {
    background-color: #e6b3e6;
    /* Bright pink neon color */
    box-shadow: 0 0 20px #9f7ac9, 0 0 40px  #b38ede, 0 0 60px #140b1e;
    /* Adding the bright pink neon glow effect */
    transform: scale(1.1);
}
.card {
  font-family: sans-serif;
  position: relative;
  width: 105px;
  height: 150px;
  border-radius: 5px;
  border: 1px solid #ccc;
  box-shadow: 0px 0px 5px 0px rgba(0, 0, 0, 0.25);
}

.card.spades,
.card.clubs {
  color: black;
}
.card.hearts,
.card.diamonds {
  color: red;
}

.card-value-suit {
  display: inline-block;
  position: absolute;
}
.card-value-suit.top {
  top: 5px;
  left: 5px;
}
.card-value-suit.bot {
  transform: rotate(180deg);
  bottom: 5px;
  right: 5px;
}
.card-suit {
  font-size: 50px;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  left: 25%;
}
    </style>
  </head>
  <body>
    <nav>
        <div class="navBar">
            <div class="title">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/0a/Card_club.svg/167px-Card_club.svg.png?20170110224944" alt="logo" width="100" height="100" style="display: block; border-radius: 200px; box-sizing: border-box; background-color: #cfd8dc; border: 15px solid #cfd8dc;">
                <span>Chance Casino and Resort</span> 
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/Explore/">Explore</a>
                <a href="/About/">About Us</a>
                <a href="/Booking/">Booking</a>
                <a href="/Get Help/">Gambling Addiction?</a>
            </div>
        </div>
    </nav>
    <div style="margin: 10pt;">
        <h1 style="font-weight: bolder;">Welcome to The Chance Casino and Resort of Maryland</h1>
        <hr>
        <h5 style="font-weight: lighter;">1000 Big Win Avenue, Maryland, 17432</h5>
        <br>
        <h1>FREE GIVEAWAY</h1>
        <h2>Win a free getaway all expenses paid trip if you pull an 1/52 Jack of Spades!</h2>
        <script src="card.js"></script>
    </div>
  </body>
</html>
